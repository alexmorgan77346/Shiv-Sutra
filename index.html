<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0908" id="themeColor">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shiv Sutra">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Shiv Sutra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>

/* TOKENS */
:root {
  --bg:       #f3ede0;
  --bg2:      #ece5d3;
  --surface:  #f8f3e8;
  --gold:     #b08820;
  --gold2:    #886600;
  --glow:     rgba(176,136,32,0.13);
  --text:     #14110a;
  --text2:    #322b1c;
  --text3:    #6e6048;
  --line:     rgba(20,17,10,0.13);
  --line2:    rgba(20,17,10,0.07);
  --hdr:      rgba(243,237,224,0.96);
  --obg:      rgba(176,136,32,0.07);
  --oline:    rgba(176,136,32,0.28);
  --dev:      "Noto Serif Devanagari", serif;
  --en:       "EB Garamond", Georgia, serif;
  --dis:      "Cinzel", serif;
}
[data-theme="dark"] {
  --bg:       #0a0908;
  --bg2:      #131109;
  --surface:  #161410;
  --gold:     #d4a840;
  --gold2:    #eec850;
  --glow:     rgba(212,168,64,0.1);
  --text:     #ede5cc;
  --text2:    #c0aa80;
  --text3:    #6a5a40;
  --line:     rgba(240,216,140,0.11);
  --line2:    rgba(240,216,140,0.06);
  --hdr:      rgba(10,9,8,0.96);
  --obg:      rgba(212,168,64,0.07);
  --oline:    rgba(212,168,64,0.22);
}

/* BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--en);min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  transition:background .45s,color .45s;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 45% at 8% 0%,  rgba(176,136,32,.06) 0%,transparent 60%),
    radial-gradient(ellipse 55% 60% at 92% 100%,rgba(176,136,32,.04) 0%,transparent 60%);
}
[data-theme="dark"] body::before{
  background:
    radial-gradient(ellipse 70% 45% at 8% 0%,  rgba(212,168,64,.09) 0%,transparent 60%),
    radial-gradient(ellipse 55% 60% at 92% 100%,rgba(212,168,64,.05) 0%,transparent 60%);
}
::selection{background:var(--glow);color:var(--gold2)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s,visibility .9s;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.sp-wrap{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:26px}
.sp-ring{position:absolute;inset:0;animation:spin 14s linear infinite}
.sp-om{font-family:var(--dev);font-size:46px;color:var(--gold);animation:breathe 2.8s ease-in-out infinite;line-height:1}
.sp-name{font-family:var(--dis);font-size:clamp(20px,5vw,30px);letter-spacing:.28em;color:var(--text);text-transform:uppercase;margin-bottom:8px}
.sp-tag{display:flex;align-items:center;gap:10px;margin-bottom:26px}
.sp-dash{width:26px;height:1px;background:var(--gold);flex-shrink:0}
.sp-tagline{font-family:var(--en);font-style:italic;font-size:12px;color:var(--text2);letter-spacing:.05em}
.sp-bar{width:70px;height:1px;background:var(--line);overflow:hidden}
.sp-fill{height:100%;background:var(--gold);animation:grow 2.2s ease forwards}
@keyframes grow{from{width:0}to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}

/* SHARED CONTROL COMPONENTS */
.ctrl-bar{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:nowrap}

.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 11px 5px 8px;
  border:1px solid var(--line);border-radius:100px;
  background:transparent;
  font-family:var(--en);font-style:italic;
  font-size:11.5px;color:var(--text2);
  cursor:pointer;outline:none;
  transition:all .22s;white-space:nowrap;user-select:none;
}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.on{background:var(--glow);border-color:var(--gold);color:var(--gold2)}
[data-theme="dark"] .pill.on{color:var(--gold)}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .22s,box-shadow .22s}
.pill.on .pdot{background:var(--gold);box-shadow:0 0 5px rgba(212,168,64,.6)}

.ltog{display:flex;border:1px solid var(--line);border-radius:100px;overflow:hidden}
.lb{
  background:transparent;border:none;
  padding:5px 11px;
  font-family:var(--dev);font-size:11px;
  color:var(--text3);cursor:pointer;
  transition:all .22s;outline:none;line-height:1.4;
}
.lb.on{background:var(--gold);color:var(--bg);font-weight:600}

.rbtn{
  width:34px;height:34px;flex-shrink:0;
  border:1px solid var(--line);border-radius:50%;
  background:transparent;cursor:pointer;outline:none;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .22s;
}
.rbtn:hover{border-color:var(--gold)}

/* LIST HEADER */
#LH{
  position:sticky;top:0;z-index:200;
  background:var(--hdr);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--line);
  padding:0 clamp(16px,5vw,28px);
  transition:background .45s,border-color .45s;
}
.lh-in{
  max-width:700px;margin:0 auto;padding:12px 0;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{text-decoration:none;flex-shrink:0}
.bn{font-family:var(--dis);font-size:clamp(13px,3.5vw,16px);letter-spacing:.22em;color:var(--text);text-transform:uppercase;display:block}
.bt{font-family:var(--en);font-style:italic;font-size:10px;color:var(--text3);letter-spacing:.06em;display:block;margin-top:1px}

/* LIST BODY */
#LB{max-width:700px;margin:0 auto;padding:0 clamp(16px,5vw,28px) clamp(80px,15vw,120px);position:relative;z-index:1}

.ch-h{padding:34px 0 13px;text-align:center}
.ch-nl{font-family:var(--en);font-style:italic;font-size:10.5px;color:var(--text3);letter-spacing:.14em;margin-bottom:5px}
.ch-tt{font-family:var(--dis);font-size:clamp(11px,2.8vw,13.5px);letter-spacing:.18em;text-transform:uppercase;color:var(--gold2)}
[data-theme="dark"] .ch-tt{color:var(--gold)}
.ch-rl{width:34px;height:1px;background:var(--gold);opacity:.45;margin:9px auto 0}

.row{
  display:flex;align-items:center;gap:0;
  padding:15px 0;border-bottom:1px solid var(--line2);
  cursor:pointer;position:relative;
  opacity:0;transform:translateY(10px);
  transition:opacity .36s,transform .36s;
}
.row:first-of-type{border-top:1px solid var(--line2)}
.row.in{opacity:1;transform:none}
.row::before{
  content:"";position:absolute;
  inset:0 calc(-1 * clamp(16px,5vw,28px));
  background:var(--glow);opacity:0;border-radius:2px;
  transition:opacity .18s;
}
.row:hover::before,.row:active::before{opacity:1}
.row:hover .rarrow{opacity:1;transform:translateX(0);color:var(--gold)}
.row:hover .rnum{color:var(--gold)}
.rnum{font-family:var(--en);font-size:10px;color:var(--text3);letter-spacing:.1em;width:38px;flex-shrink:0;padding-top:3px;transition:color .2s;position:relative;z-index:1}
.rbody{flex:1;position:relative;z-index:1;min-width:0}
.rskt{font-family:var(--dev);font-size:clamp(15px,4vw,19px);font-weight:400;line-height:1.55;color:var(--text);letter-spacing:.01em;word-break:break-word}
.rtr{font-family:var(--en);font-style:italic;font-size:clamp(11.5px,3vw,13.5px);color:var(--text2);margin-top:4px;line-height:1.55;transition:opacity .22s}
.rtr.hi{font-family:var(--dev);font-style:normal;font-size:clamp(10.5px,2.8vw,12px);font-weight:300}
.rarrow{font-size:16px;margin-left:10px;flex-shrink:0;opacity:0;transform:translateX(-6px);transition:all .2s;position:relative;z-index:1;line-height:1}

/* DETAIL VIEW */
#DV{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);
  overflow-y:auto;overflow-x:hidden;
  transform:translateX(102%);
  transition:transform .42s cubic-bezier(.4,0,.2,1);
  will-change:transform;
  -webkit-overflow-scrolling:touch;
}
#DV.open{transform:translateX(0)}

/* Detail top bar */
.db{
  position:sticky;top:0;z-index:10;
  background:var(--hdr);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--line);
  padding:0 clamp(14px,4.5vw,26px);
  transition:background .45s,border-color .45s;
}
.db-in{
  max-width:700px;margin:0 auto;padding:10px 0;
  display:flex;align-items:center;
  justify-content:space-between;gap:8px;
}
.bk{
  display:flex;align-items:center;gap:7px;
  background:none;border:none;cursor:pointer;
  font-family:var(--en);font-size:13px;
  color:var(--text2);outline:none;padding:4px 0;
  transition:color .2s;flex-shrink:0;
}
.bk:hover{color:var(--gold)}
.bk svg{width:13px;height:13px;flex-shrink:0}
.dpos{font-family:var(--en);font-style:italic;font-size:11px;color:var(--text3);flex-shrink:0}
.dbr{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap}
.fav-btn{background:none;border:none;cursor:pointer;font-size:17px;color:var(--text3);transition:all .2s;outline:none;padding:2px;line-height:1}
.fav-btn:hover{color:var(--gold);transform:scale(1.2)}
.fav-btn.on{color:var(--gold)}

/* Detail body */
.dbody{max-width:700px;margin:0 auto;padding:0 clamp(16px,5vw,28px) clamp(60px,12vw,100px)}

/* Hero */
.hero{padding:clamp(28px,6vw,50px) 0 clamp(20px,4.5vw,32px);text-align:center}
.hch{font-family:var(--en);font-style:italic;font-size:11px;color:var(--text3);letter-spacing:.13em;margin-bottom:10px}
.hnr{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px}
.hnd{width:22px;height:1px;background:var(--gold);opacity:.5}
.hn{font-family:var(--dis);font-size:10.5px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase}
.hskt{font-family:var(--dev);font-size:clamp(22px,6vw,34px);font-weight:500;line-height:1.55;color:var(--text);letter-spacing:.02em;word-break:break-word}

/* Meaning */
.meaning{padding:clamp(18px,4vw,26px) 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:clamp(18px,4vw,28px);text-align:center}
.mlbl{font-family:var(--dis);font-size:8.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.mtxt{font-size:clamp(15px,4vw,19px);line-height:1.8;color:var(--text)}
.mtxt.hi{font-family:var(--dev);font-weight:300}
.mtxt.en{font-family:var(--en);font-style:italic}

/* Osho block */
.osho-blk{
  display:none;
  padding:clamp(18px,4vw,26px) clamp(16px,4vw,26px);
  background:var(--obg);
  border-left:2px solid var(--gold);
  border-radius:0 4px 4px 0;
  margin-bottom:clamp(22px,4.5vw,34px);
  position:relative;
}
.osho-blk.show{display:block}
.osho-q{position:absolute;top:4px;left:13px;font-family:var(--en);font-size:60px;line-height:1;color:var(--gold);opacity:.12;font-style:italic;pointer-events:none}
.olbl{font-family:var(--dis);font-size:8.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.olbl::after{content:"";flex:1;height:1px;background:var(--oline)}
.otxt{font-size:clamp(13px,3.3vw,15.5px);line-height:1.95;color:var(--text2)}
.otxt.hi{font-family:var(--dev);font-weight:300;font-size:clamp(12px,3vw,14px)}
.otxt.en{font-family:var(--en);font-style:italic}
.osig{margin-top:13px;font-family:var(--en);font-style:italic;font-size:11px;color:var(--text3);text-align:right}

/* Nav */
.dnav{display:flex;justify-content:space-between;align-items:center;padding-top:22px;border-top:1px solid var(--line);gap:10px}
.dnbtn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:var(--en);font-size:12px;color:var(--text2);outline:none;padding:8px 0;transition:color .2s;max-width:44%}
.dnbtn:hover{color:var(--gold)}
.dnbtn:disabled{opacity:.28;pointer-events:none}
.dnbtn svg{flex-shrink:0}
.dnskt{font-family:var(--dev);font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.dnbtn.nx{flex-direction:row-reverse;text-align:right}

/* TOAST */
#toast{
  position:fixed;bottom:clamp(18px,5vw,28px);left:50%;
  transform:translateX(-50%) translateY(12px);
  z-index:9999;background:var(--surface);
  border:1px solid var(--line);border-radius:100px;
  padding:9px 18px;font-family:var(--en);font-size:12.5px;
  color:var(--text2);opacity:0;pointer-events:none;
  transition:opacity .28s,transform .28s;white-space:nowrap;
  box-shadow:0 4px 22px rgba(0,0,0,.18);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:360px){
  .lb{padding:5px 8px;font-size:10px}
  .pill{padding:5px 8px 5px 7px;font-size:10px}
  .rbtn,.dbr .rbtn{width:30px;height:30px;font-size:12px}
  .ctrl-bar,.dbr{gap:5px}
  .bk{font-size:12px}
}
@media(max-width:480px){
  .bt{display:none}
  .dbr .pill > span:last-child{display:none}
  .dbr .pill{padding:5px 8px}
}
@media(min-width:640px){
  .rskt{font-size:20px}
  .rtr{font-size:14px}
  .hskt{font-size:28px}
}
@supports(padding:max(0px)){
  #LH,.db{
    padding-left:max(clamp(16px,5vw,28px),env(safe-area-inset-left));
    padding-right:max(clamp(16px,5vw,28px),env(safe-area-inset-right));
  }
  #LB,.dbody{
    padding-left:max(clamp(16px,5vw,28px),env(safe-area-inset-left));
    padding-right:max(clamp(16px,5vw,28px),env(safe-area-inset-right));
    padding-bottom:max(100px,calc(env(safe-area-inset-bottom) + 80px));
  }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-wrap">
    <svg class="sp-ring" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="48" cy="48" r="44" stroke="var(--gold)" stroke-width="0.6" stroke-dasharray="4 7" opacity="0.5"/>
      <circle cx="48" cy="48" r="36" stroke="var(--gold)" stroke-width="0.4" stroke-dasharray="2 9" opacity="0.3"/>
      <polygon points="48,8 84,72 12,72"  stroke="var(--gold)" stroke-width="0.5" fill="none" opacity="0.28"/>
      <polygon points="48,88 84,24 12,24" stroke="var(--gold)" stroke-width="0.5" fill="none" opacity="0.28"/>
    </svg>
    <span class="sp-om">ॐ</span>
  </div>
  <div class="sp-name">Shiv Sutra</div>
  <div class="sp-tag">
    <span class="sp-dash"></span>
    <span class="sp-tagline">Know Yourself as Consciousness</span>
    <span class="sp-dash"></span>
  </div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- LIST HEADER -->
<div id="LH">
  <div class="lh-in">
    <a class="brand" href="#">
      <span class="bn">Shiv Sutra</span>
      <span class="bt">शिव सूत्र · 77 Aphorisms</span>
    </a>
    <div class="ctrl-bar">
      <button class="pill" id="OP" onclick="toggleOsho()">
        <span class="pdot" id="OPD"></span>
        <span id="OPL">Osho</span>
      </button>
      <div class="ltog">
        <button class="lb on" data-l="hindi"   onclick="setLang('hindi')">हिंदी</button>
        <button class="lb"   data-l="english"  onclick="setLang('english')">Eng</button>
      </div>
      <button class="rbtn" id="TB" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</div>

<!-- LIST BODY -->
<div id="LB"></div>

<!-- DETAIL VIEW -->
<div id="DV">
  <div class="db">
    <div class="db-in">
      <button class="bk" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <span class="dpos" id="DPOS"></span>
      <div class="dbr">
        <button class="pill" id="DOP" onclick="toggleOsho()">
          <span class="pdot"></span>
          <span id="DOPL">Osho</span>
        </button>
        <div class="ltog">
          <button class="lb" data-l="hindi"   onclick="setLang('hindi')">हिंदी</button>
          <button class="lb" data-l="english" onclick="setLang('english')">Eng</button>
        </div>
        <button class="rbtn" id="DTB" onclick="toggleTheme()">🌙</button>
        <button class="fav-btn" id="FAV" onclick="toggleFav()">☆</button>
      </div>
    </div>
  </div>
  <div class="dbody">
    <div id="DC"></div>
    <div class="dnav">
      <button class="dnbtn pv" id="PREV" onclick="nav(-1)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
        <span class="dnskt" id="PSKT"></span>
      </button>
      <button class="dnbtn nx" id="NEXT" onclick="nav(1)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        <span class="dnskt" id="NSKT"></span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let SUTRAS=[],CHAPTERS=[];
let lang=localStorage.getItem("ss-lang")||"hindi";
let theme=localStorage.getItem("ss-theme")||"dark";
let osho=localStorage.getItem("ss-osho")==="true";
let favs=JSON.parse(localStorage.getItem("ss-favs")||"[]");
let cur=null;

applyTheme(theme);
syncLang();

window.addEventListener("load",async()=>{
  try{const r=await fetch("./sutras.json");const d=await r.json();SUTRAS=d.sutras;CHAPTERS=d.chapters;}catch(e){console.error(e);}
  setTimeout(()=>{document.getElementById("splash").classList.add("gone");renderList();syncOsho();},2400);
});

function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  const ic=t==="dark"?"🌙":"☀️";
  const mt=t==="dark"?"#0a0908":"#f3ede0";
  ["TB","DTB"].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent=ic;});
  const m=document.getElementById("themeColor");if(m)m.content=mt;
}
function toggleTheme(){
  theme=theme==="dark"?"light":"dark";
  localStorage.setItem("ss-theme",theme);
  applyTheme(theme);
  if(cur!==null)renderDetail(cur);
}

function syncLang(){document.querySelectorAll(".lb").forEach(b=>b.classList.toggle("on",b.dataset.l===lang));}
function setLang(l){
  if(l===lang)return;lang=l;localStorage.setItem("ss-lang",l);syncLang();
  document.querySelectorAll(".rtr[data-id]").forEach(el=>{
    const s=SUTRAS.find(x=>x.id===+el.dataset.id);if(!s)return;
    el.textContent=l==="hindi"?s.hindi:s.english;
    el.className="rtr"+(l==="hindi"?" hi":"");
  });
  if(cur!==null)renderDetail(cur);
}

function syncOsho(){
  ["OP","DOP"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("on",osho);});
  ["OPL","DOPL"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=osho?"Osho ✓":"Osho";});
}
function toggleOsho(){
  osho=!osho;localStorage.setItem("ss-osho",osho);syncOsho();
  const b=document.querySelector(".osho-blk");if(b)b.classList.toggle("show",osho);
  toast(osho?"Osho commentary on":"Osho commentary off");
}

function renderList(){
  const body=document.getElementById("LB");body.innerHTML="";let lastCh=0;
  SUTRAS.forEach((s,idx)=>{
    const ch=CHAPTERS.find(c=>s.id>=c.range[0]&&s.id<=c.range[1]);
    if(ch&&ch.id!==lastCh){
      const h=document.createElement("div");h.className="ch-h";
      h.innerHTML=`<div class="ch-nl">अध्याय ${ch.id} · Chapter ${ch.id}</div><div class="ch-tt">${ch.name} · ${ch.nameEn}</div><div class="ch-rl"></div>`;
      body.appendChild(h);lastCh=ch.id;
    }
    const tr=lang==="hindi"?s.hindi:s.english;
    const tc=lang==="hindi"?" hi":"";
    const row=document.createElement("div");row.className="row";row.dataset.id=s.id;
    row.style.transitionDelay=`${Math.min(idx*.016,.65)}s`;
    row.innerHTML=`<span class="rnum">${String(s.id).padStart(2,"0")}</span><div class="rbody"><div class="rskt">${s.sanskrit}</div><div class="rtr${tc}" data-id="${s.id}">${tr}</div></div><span class="rarrow">›</span>`;
    row.addEventListener("click",()=>openDetail(s.id));
    body.appendChild(row);
  });
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");obs.unobserve(e.target);}});
  },{threshold:.04,rootMargin:"0px 0px -16px 0px"});
  document.querySelectorAll(".row").forEach(r=>obs.observe(r));
}

function openDetail(id){
  cur=id;renderDetail(id);
  document.getElementById("DV").classList.add("open");
  document.getElementById("DV").scrollTop=0;
  document.body.style.overflow="hidden";
}
function closeDetail(){
  document.getElementById("DV").classList.remove("open");
  document.body.style.overflow="";cur=null;
}

function renderDetail(id){
  const s=SUTRAS.find(x=>x.id===id);if(!s)return;
  const idx=SUTRAS.indexOf(s);
  const ch=CHAPTERS.find(c=>s.id>=c.range[0]&&s.id<=c.range[1]);
  const isFav=favs.includes(id);
  document.getElementById("DPOS").textContent=`${id} / ${SUTRAS.length}`;
  const fb=document.getElementById("FAV");fb.textContent=isFav?"★":"☆";fb.classList.toggle("on",isFav);
  syncOsho();syncLang();
  const tr=lang==="hindi"?s.hindi:s.english;
  const tc=lang==="hindi"?"hi":"en";
  const ot=lang==="hindi"?s.osho_hindi:s.osho_english;
  const oc=lang==="hindi"?"hi":"en";
  document.getElementById("DC").innerHTML=`
    <div class="hero">
      <div class="hch">${ch?ch.name+" · "+ch.nameEn:""}</div>
      <div class="hnr"><span class="hnd"></span><span class="hn">सूत्र ${String(id).padStart(2,"0")}</span><span class="hnd"></span></div>
      <div class="hskt">${s.sanskrit}</div>
    </div>
    <div class="meaning">
      <div class="mlbl">Meaning · अर्थ</div>
      <div class="mtxt ${tc}">${tr}</div>
    </div>
    <div class="osho-blk ${osho?"show":""}">
      <div class="osho-q">"</div>
      <div class="olbl">Osho</div>
      <div class="otxt ${oc}">${ot}</div>
      <div class="osig">— Osho, Shiv Sutra Discourses, Pune 1974</div>
    </div>`;
  const prev=SUTRAS[idx-1],next=SUTRAS[idx+1];
  document.getElementById("PREV").disabled=!prev;
  document.getElementById("NEXT").disabled=!next;
  document.getElementById("PSKT").textContent=prev?prev.sanskrit:"";
  document.getElementById("NSKT").textContent=next?next.sanskrit:"";
}

function nav(dir){
  const s=SUTRAS.find(x=>x.id===cur);if(!s)return;
  const t=SUTRAS[SUTRAS.indexOf(s)+dir];
  if(t){cur=t.id;renderDetail(t.id);document.getElementById("DV").scrollTop=0;}
}

function toggleFav(){
  if(cur===null)return;
  const i=favs.indexOf(cur);
  if(i===-1){favs.push(cur);toast("★ Saved to favourites");}
  else{favs.splice(i,1);toast("Removed from favourites");}
  localStorage.setItem("ss-favs",JSON.stringify(favs));
  renderDetail(cur);
}

document.addEventListener("keydown",e=>{
  if(!document.getElementById("DV").classList.contains("open"))return;
  if(e.key==="Escape")closeDetail();
  if(e.key==="ArrowRight")nav(1);
  if(e.key==="ArrowLeft")nav(-1);
});

let _tx=0,_ty=0;
const DV=document.getElementById("DV");
DV.addEventListener("touchstart",e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;},{passive:true});
DV.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=Math.abs(e.changedTouches[0].clientY-_ty);
  if(dx>64&&dy<44)closeDetail();
},{passive:true});

function toast(msg,dur=2100){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),dur);
}

window.addEventListener("offline",()=>toast("Offline — cache mode"));
window.addEventListener("online", ()=>toast("Back online"));
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>
