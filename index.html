<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a" id="themeColorMeta">
<meta name="description" content="Shiv Sutra - Know Yourself as Consciousness">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shiv Sutra">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Shiv Sutra · शिव सूत्र</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Marcellus&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════
   DESIGN TOKENS — DARK (default)
   ════════════════════════════════════════ */
:root {
  --bg:            #080808;
  --surface:       #111111;
  --card:          #161616;
  --card-hover:    #1e1e1e;
  --border:        rgba(212,175,55,0.15);
  --border-hover:  rgba(212,175,55,0.32);
  --gold:          #d4af37;
  --gold-light:    #f0d060;
  --gold-dim:      rgba(212,175,55,0.6);
  --text-primary:  #f0ead8;
  --text-secondary:rgba(240,234,216,0.58);
  --text-muted:    rgba(240,234,216,0.32);
  --header-bg:     rgba(8,8,8,0.92);
  --shadow:        0 4px 32px rgba(0,0,0,0.6), 0 1px 0 rgba(212,175,55,0.07) inset;
  --shadow-hover:  0 8px 48px rgba(0,0,0,0.8), 0 0 0 1px rgba(212,175,55,0.22);
  --serif-dev:     'Noto Serif Devanagari', serif;
  --serif-en:      'Cormorant Garamond', Georgia, serif;
  --display:       'Marcellus', serif;
  --radius:        18px;
  --t:             all 0.32s cubic-bezier(0.4,0,0.2,1);
}

/* ════════════════════════════════════════
   LIGHT MODE TOKENS
   ════════════════════════════════════════ */
[data-theme="light"] {
  --bg:            #fdf8ee;
  --surface:       #f5edd8;
  --card:          #fffdf7;
  --card-hover:    #fff8e8;
  --border:        rgba(180,140,20,0.18);
  --border-hover:  rgba(180,140,20,0.38);
  --gold:          #a07010;
  --gold-light:    #c08820;
  --gold-dim:      rgba(160,112,16,0.65);
  --text-primary:  #1a1408;
  --text-secondary:rgba(26,20,8,0.62);
  --text-muted:    rgba(26,20,8,0.38);
  --header-bg:     rgba(253,248,238,0.94);
  --shadow:        0 2px 20px rgba(160,112,16,0.10), 0 1px 0 rgba(160,112,16,0.07) inset;
  --shadow-hover:  0 6px 32px rgba(160,112,16,0.18), 0 0 0 1px rgba(160,112,16,0.2);
}

/* ════════════════════════════════════════
   RESET
   ════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--serif-dev);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease, color 0.4s ease;
}

/* grain overlay (dark only) */
[data-theme="dark"] body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.35;
}

/* ════════════════════════════════════════
   SPLASH
   ════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0;
  background: #080808;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2000;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.splash-om {
  font-size: 76px; line-height: 1; margin-bottom: 18px;
  color: #d4af37;
  filter: drop-shadow(0 0 28px rgba(212,175,55,0.45));
  animation: omPulse 2s ease-in-out infinite;
}
.splash-title {
  font-family: var(--display);
  font-size: clamp(26px,6vw,40px);
  color: #d4af37; letter-spacing: 0.14em; margin-bottom: 6px;
}
.splash-sub {
  font-family: var(--serif-dev);
  font-size: 13px; color: rgba(240,234,216,0.5); letter-spacing: 0.06em;
}
.splash-loader {
  width: 110px; height: 2px;
  background: rgba(212,175,55,0.18);
  border-radius: 2px; margin-top: 28px; overflow: hidden;
}
.splash-loader::after {
  content: ''; display: block; height: 100%;
  background: #d4af37; border-radius: 2px;
  animation: load 1.9s ease forwards;
}
@keyframes load { from{width:0} to{width:100%} }
@keyframes omPulse {
  0%,100%{ transform:scale(1);   filter:drop-shadow(0 0 24px rgba(212,175,55,0.4)); }
  50%    { transform:scale(1.07);filter:drop-shadow(0 0 44px rgba(212,175,55,0.75)); }
}

/* ════════════════════════════════════════
   HEADER
   ════════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  transition: background 0.4s ease, border-color 0.4s ease;
}
.header-inner {
  max-width: 720px; margin: 0 auto;
  padding: 14px 0;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}

/* Brand */
.brand { display:flex; align-items:center; gap:9px; text-decoration:none; }
.brand-om {
  font-size: 24px; line-height:1; color: var(--gold);
  filter: drop-shadow(0 0 7px rgba(212,175,55,0.45));
}
.brand-text { display:flex; flex-direction:column; line-height:1.15; }
.brand-name {
  font-family: var(--display); font-size: 19px;
  color: var(--gold-light); letter-spacing: 0.09em;
}
.brand-tagline {
  font-family: var(--serif-en); font-style:italic;
  font-size: 10.5px; color: var(--text-muted); letter-spacing:0.05em;
}

/* Controls row (lang toggle + theme btn) */
.header-controls { display:flex; align-items:center; gap:8px; flex-shrink:0; }

/* Language pill toggle */
.lang-toggle {
  display:flex; background:rgba(128,128,128,0.07);
  border:1px solid var(--border); border-radius:100px;
  padding:3px; gap:2px;
}
.lang-btn {
  background:transparent; border:none;
  padding:5px 12px; border-radius:100px;
  font-family: var(--serif-dev); font-size:12px;
  color: var(--text-secondary); cursor:pointer;
  transition: var(--t); white-space:nowrap; outline:none;
}
.lang-btn.active {
  background: var(--gold); color:#0a0a0a;
  font-weight:600; box-shadow:0 2px 10px rgba(212,175,55,0.28);
}

/* Theme toggle button */
.theme-btn {
  width: 36px; height: 36px;
  background: rgba(128,128,128,0.07);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer; outline: none;
  display: flex; align-items:center; justify-content:center;
  font-size: 16px;
  transition: var(--t);
  color: var(--text-secondary);
  flex-shrink: 0;
}
.theme-btn:hover {
  border-color: var(--border-hover);
  background: rgba(212,175,55,0.08);
  transform: rotate(18deg) scale(1.08);
}

/* ════════════════════════════════════════
   STATS
   ════════════════════════════════════════ */
.stats-bar {
  max-width:720px; margin:0 auto;
  padding:10px 20px;
}
.stats-count { font-family:var(--serif-en); font-size:12px; color:var(--text-muted); letter-spacing:0.04em; }
.stats-gold  { color:var(--gold-dim); }

/* ════════════════════════════════════════
   MAIN / CARDS
   ════════════════════════════════════════ */
main { max-width:720px; margin:0 auto; padding:4px 16px 80px; }

/* Chapter divider */
.chapter-divider { text-align:center; padding:22px 0 10px; }
.chapter-label {
  font-family:var(--display); font-size:12.5px;
  color:var(--gold-dim); letter-spacing:0.2em; text-transform:uppercase;
  display:inline-flex; align-items:center; gap:12px;
}
.chapter-label::before,
.chapter-label::after {
  content:''; display:block; width:36px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim));
}
.chapter-label::after { background:linear-gradient(90deg,var(--gold-dim),transparent); }

/* Card */
.sutra-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 22px 18px;
  margin-bottom: 11px;
  box-shadow: var(--shadow);
  transition: var(--t);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(18px);
}
.sutra-card.visible { opacity:1; transform:translateY(0); }

.sutra-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
  opacity:0; transition:opacity 0.3s ease;
}
.sutra-card:hover {
  background: var(--card-hover);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.sutra-card:hover::before { opacity:1; }
.sutra-card.faved { border-color: rgba(212,175,55,0.4); }
[data-theme="light"] .sutra-card.faved { border-color: rgba(160,112,16,0.38); }

/* Card header row */
.card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px; }
.sutra-num {
  font-family:var(--serif-en); font-size:11px; color:var(--gold-dim);
  letter-spacing:0.12em; text-transform:uppercase; font-weight:500;
  padding:3px 10px; border:1px solid var(--border); border-radius:100px;
  flex-shrink:0; margin-top:2px;
}
.fav-btn {
  background:none; border:none; cursor:pointer; font-size:15px;
  color:var(--text-muted); transition:var(--t); padding:3px; line-height:1;
  flex-shrink:0; outline:none;
}
.fav-btn:hover { color:var(--gold); transform:scale(1.25); }
.fav-btn.active { color:var(--gold); filter:drop-shadow(0 0 5px rgba(212,175,55,0.5)); }

/* Sanskrit */
.sanskrit {
  font-family:var(--serif-dev);
  font-size:clamp(17px,4.2vw,21px); font-weight:500;
  line-height:1.65; color:var(--text-primary);
  margin-bottom:13px; letter-spacing:0.01em;
}

/* Translation */
.translation {
  font-size:clamp(13px,3vw,15px); line-height:1.75;
  color:var(--text-secondary);
  padding-top:11px; border-top:1px solid var(--border);
  transition:opacity 0.28s ease;
}
.translation.lang-hindi  { font-family:var(--serif-dev); font-weight:300; }
.translation.lang-english { font-family:var(--serif-en); font-style:italic; font-size:clamp(14px,3.3vw,16px); letter-spacing:0.01em; }
.translation.fading { opacity:0; }

/* ════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════ */
footer {
  text-align:center; padding:18px 20px;
  border-top:1px solid var(--border); margin-top:16px;
}
.footer-text { font-family:var(--serif-en); font-style:italic; font-size:11.5px; color:var(--text-muted); }
.footer-om { color:var(--gold-dim); font-style:normal; }

/* ════════════════════════════════════════
   SCROLLBAR
   ════════════════════════════════════════ */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.22); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:rgba(212,175,55,0.42); }
::selection { background:rgba(212,175,55,0.2); color:var(--gold-light); }

/* ════════════════════════════════════════
   INSTALL BANNER
   ════════════════════════════════════════ */
#installBanner {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(120px);
  z-index: 500;
  background: var(--card);
  border: 1px solid var(--border-hover);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.15);
  max-width: calc(100vw - 32px);
  width: 360px;
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
  opacity: 0;
}
#installBanner.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#installBanner.hide { transform: translateX(-50%) translateY(120px); opacity: 0; }

.install-icon { font-size: 26px; flex-shrink: 0; line-height:1; }
.install-text { flex: 1; min-width: 0; }
.install-title {
  font-family: var(--display); font-size: 14px;
  color: var(--gold-light); letter-spacing: 0.06em; margin-bottom: 2px;
}
.install-sub {
  font-family: var(--serif-en); font-style: italic;
  font-size: 11.5px; color: var(--text-muted);
}
.install-actions { display: flex; gap: 6px; flex-shrink: 0; }
.install-btn {
  padding: 7px 14px; border-radius: 100px; border: none;
  font-family: var(--serif-dev); font-size: 12px;
  cursor: pointer; outline: none; transition: var(--t);
  font-weight: 600;
}
.install-btn.primary {
  background: var(--gold); color: #0a0a0a;
  box-shadow: 0 2px 12px rgba(212,175,55,0.3);
}
.install-btn.primary:hover { background: var(--gold-light); transform: scale(1.05); }
.install-btn.dismiss {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.install-btn.dismiss:hover { color: var(--text-secondary); border-color: var(--border-hover); }

/* ════════════════════════════════════════
   OFFLINE / ONLINE TOAST
   ════════════════════════════════════════ */
#netToast {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%) translateY(-20px);
  z-index: 400;
  padding: 9px 18px; border-radius: 100px;
  font-family: var(--serif-dev); font-size: 12.5px; font-weight: 500;
  display: flex; align-items: center; gap: 7px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  white-space: nowrap;
}
#netToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#netToast.offline { background: #2a1a0a; border: 1px solid rgba(212,100,30,0.4); color: #f0a060; }
#netToast.online  { background: #0a1a0a; border: 1px solid rgba(80,180,80,0.35); color: #80d080; }

/* ════════════════════════════════════════
   CACHE PROGRESS (shown in splash)
   ════════════════════════════════════════ */
.splash-cache-status {
  font-family: var(--serif-en); font-style: italic;
  font-size: 11px; color: rgba(212,175,55,0.45);
  margin-top: 10px; letter-spacing: 0.06em;
  min-height: 16px; transition: opacity 0.3s ease;
}

/* ════════════════════════════════════════
   CACHED BADGE in footer
   ════════════════════════════════════════ */
.cache-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--serif-en); font-size: 11px;
  color: var(--text-muted); margin-top: 6px;
  opacity: 0; transition: opacity 0.5s ease;
}
.cache-badge.show { opacity: 1; }
.cache-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #80d080;
  box-shadow: 0 0 6px rgba(80,200,80,0.5);
}

/* ════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════ */
@media(max-width:480px){
  .sutra-card { padding:18px 16px 14px; }
  .brand-tagline { display:none; }
  .lang-btn { padding:5px 10px; }
  #installBanner { width: calc(100vw - 32px); }
}
</style>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-om">ॐ</div>
  <div class="splash-title">Shiv Sutra</div>
  <div class="splash-sub">शिव सूत्र · Know Yourself as Consciousness</div>
  <div class="splash-loader"></div>
  <div class="splash-cache-status" id="splashStatus">जागृत हो रहा है…</div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <a class="brand" href="#">
      <span class="brand-om">ॐ</span>
      <span class="brand-text">
        <span class="brand-name">Shiv Sutra</span>
        <span class="brand-tagline">Know Yourself as Consciousness</span>
      </span>
    </a>

    <div class="header-controls">
      <!-- Language toggle -->
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="hindi"   onclick="setLang('hindi')">हिंदी</button>
        <button class="lang-btn"        data-lang="english" onclick="setLang('english')">English</button>
      </div>
      <!-- Theme toggle -->
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    </div>
  </div>
</header>

<!-- ── INSTALL BANNER ── -->
<div id="installBanner">
  <div class="install-icon">🕉️</div>
  <div class="install-text">
    <div class="install-title">Install Shiv Sutra</div>
    <div class="install-sub">Offline पढ़ें · Works without internet</div>
  </div>
  <div class="install-actions">
    <button class="install-btn primary" onclick="doInstall()">Install</button>
    <button class="install-btn dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>

<!-- ── NETWORK TOAST ── -->
<div id="netToast"></div>

<!-- ── STATS ── -->
<div class="stats-bar">
  <span class="stats-count"><span class="stats-gold">77</span> सूत्र · Sutras</span>
</div>

<!-- ── MAIN ── -->
<main id="main"></main>

<footer>
  <div class="footer-text"><span class="footer-om">ॐ</span> नमः शिवाय · Shiv Sutra PWA</div>
  <div class="cache-badge" id="cacheBadge"><span class="cache-dot"></span>Saved offline · Offline उपलब्ध</div>
</footer>

let currentLang  = localStorage.getItem('ss-lang')  || 'hindi';

// Apply saved theme immediately (before splash)

/* ══════════════════════════════════════════
   THEME
   ══════════════════════════════════════════ */
function applyTheme(theme, animate = true) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn  = document.getElementById('themeBtn');
  const meta = document.getElementById('themeColorMeta');
  if (btn)  btn.textContent = theme === 'dark' ? '🌙' : '☀️';
  if (meta) meta.content    = theme === 'dark' ? '#0a0a0a' : '#fdf8ee';
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ss-theme', currentTheme);
  applyTheme(currentTheme);
}

/* ══════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════ */
function renderCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let lastCh = 0;
  SUTRAS.forEach((s, idx) => {
    const ch = CHAPTERS.find(c => s.id >= c.range[0] && s.id <= c.range[1]);
    if (ch && ch.id !== lastCh) {
      const div = document.createElement('div');
      div.className = 'chapter-divider';
      div.innerHTML = `<span class="chapter-label">${ch.name}</span>`;
      main.appendChild(div);
      lastCh = ch.id;
    }

    const isFav = favorites.includes(s.id);
    const card  = document.createElement('div');
    card.className = 'sutra-card' + (isFav ? ' faved' : '');
    card.dataset.id = s.id;
    card.style.transitionDelay = `${Math.min(idx * 0.025, 0.55)}s`;
    card.innerHTML = `
      <div class="card-header">
        <span class="sutra-num">सूत्र ${String(s.id).padStart(2,'0')}</span>
        <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(${s.id},this)" title="Favorite">
          ${isFav?'★':'☆'}
        </button>
      </div>
      <div class="sanskrit">${s.sanskrit}</div>
      <div class="translation ${currentLang==='hindi'?'lang-hindi':'lang-english'}" data-id="${s.id}">
        ${currentLang==='hindi' ? s.hindi : s.english}
      </div>`;
    main.appendChild(card);
  });
  setupObserver();
}

/* ══════════════════════════════════════════
   LANGUAGE TOGGLE
   ══════════════════════════════════════════ */
function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('ss-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

  const els = document.querySelectorAll('.translation');
  els.forEach(el => el.classList.add('fading'));
  setTimeout(() => {
    els.forEach(el => {
      const s = SUTRAS.find(x => x.id === +el.dataset.id);
      if (!s) return;
      el.textContent = lang === 'hindi' ? s.hindi : s.english;
      el.className = `translation ${lang==='hindi'?'lang-hindi':'lang-english'}`;
    });
    requestAnimationFrame(() => els.forEach(el => el.classList.remove('fading')));
  }, 270);
}

/* ══════════════════════════════════════════
   FAVORITES
   ══════════════════════════════════════════ */
function toggleFav(id, btn) {
  const i = favorites.indexOf(id);
  if (i === -1) {
    favorites.push(id);
    btn.textContent = '★'; btn.classList.add('active');
    btn.closest('.sutra-card').classList.add('faved');
  } else {
    favorites.splice(i,1);
    btn.textContent = '☆'; btn.classList.remove('active');
    btn.closest('.sutra-card').classList.remove('faved');
  }
  localStorage.setItem('ss-favs', JSON.stringify(favorites));
}

/* ══════════════════════════════════════════
   SCROLL OBSERVER
   ══════════════════════════════════════════ */
function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.04, rootMargin: '0px 0px -16px 0px' });
  document.querySelectorAll('.sutra-card:not(.visible)').forEach(c => obs.observe(c));
}

function showInstallBanner() {
  // Don't show if already dismissed this session
  if (sessionStorage.getItem('ss-install-dismissed')) return;
  // Don't show if running as standalone PWA
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  document.getElementById('installBanner').classList.add('show');
}

function hideInstallBanner() {
  const b = document.getElementById('installBanner');
  b.classList.remove('show');
  b.classList.add('hide');
}

function doInstall() {
  if (!deferredInstallPrompt) return;
  hideInstallBanner();
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(result => {
    deferredInstallPrompt = null;
    if (result.outcome === 'accepted') {
      showToast('✓ Installing… please wait', 'online', 2500);
    }
  });
}

function dismissInstall() {
  hideInstallBanner();
  sessionStorage.setItem('ss-install-dismissed', '1');
}

// ── Network status toasts ──
function showToast(msg, type, duration = 3000) {
  const t = document.getElementById('netToast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = type; }, duration);
}

window.addEventListener('offline', () => {
  showToast('📵 Offline — Cache से चल रहा है', 'offline', 5000);
});
window.addEventListener('online', () => {
  showToast('✓ Online — Connected', 'online', 3000);
});

// ── Service Worker Registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] Registered');

        // Show "cached" badge once SW is active
        if (reg.active) {
          setTimeout(() => document.getElementById('cacheBadge').classList.add('show'), 1500);
        }

        // Listen for SW state changes
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showToast('↻ App updated — Refresh करें', 'online', 6000);
            }
            if (newWorker.state === 'activated') {
              document.getElementById('cacheBadge').classList.add('show');
              document.getElementById('splashStatus').textContent = '✓ Offline के लिए save हो गया';
            }
          });
        });

        // Message channel: track cache progress from SW
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'CACHE_PROGRESS') {
            const el = document.getElementById('splashStatus');
            if (el) el.textContent = e.data.msg;
          }
          if (e.data && e.data.type === 'CACHED') {
            document.getElementById('cacheBadge').classList.add('show');
            const el = document.getElementById('splashStatus');
            if (el) el.textContent = '✓ Offline के लिए save हो गया';
          }
        });
      })
      .catch(err => console.warn('[SW] Failed:', err));
  });
}
</script>
