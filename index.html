<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a" id="themeColorMeta">
<meta name="description" content="Shiv Sutra - Know Yourself as Consciousness">
<meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shiv Sutra">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Shiv Sutra · शिव सूत्र</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Marcellus&display=swap" rel="stylesheet">
<style>
/* ════════ TOKENS — DARK ════════ */
:root {
  --bg:           #080808;
  --card:         #141414;
  --card-hover:   #1c1c1c;
  --border:       rgba(212,175,55,0.14);
  --border-hover: rgba(212,175,55,0.32);
  --gold:         #d4af37;
  --gold-light:   #f0d060;
  --gold-dim:     rgba(212,175,55,0.58);
  --text:         #f0ead8;
  --text-2:       rgba(240,234,216,0.58);
  --text-3:       rgba(240,234,216,0.3);
  --header-bg:    rgba(8,8,8,0.92);
  --shadow:       0 4px 28px rgba(0,0,0,0.55);
  --shadow-h:     0 8px 44px rgba(0,0,0,0.75), 0 0 0 1px rgba(212,175,55,0.2);
  --dev:          'Noto Serif Devanagari', serif;
  --en:           'Cormorant Garamond', Georgia, serif;
  --dis:          'Marcellus', serif;
  --r:            18px;
  --t:            all 0.3s cubic-bezier(0.4,0,0.2,1);
  --osho-border:  rgba(212,175,55,0.12);
  --osho-bg:      rgba(212,175,55,0.04);
}
/* ════════ TOKENS — LIGHT ════════ */
[data-theme="light"] {
  --bg:           #fdf8ee;
  --card:         #fffdf7;
  --card-hover:   #fff8e8;
  --border:       rgba(160,112,16,0.16);
  --border-hover: rgba(160,112,16,0.36);
  --gold:         #a07010;
  --gold-light:   #b88820;
  --gold-dim:     rgba(160,112,16,0.62);
  --text:         #1a1408;
  --text-2:       rgba(26,20,8,0.62);
  --text-3:       rgba(26,20,8,0.36);
  --header-bg:    rgba(253,248,238,0.94);
  --shadow:       0 2px 18px rgba(160,112,16,0.10);
  --shadow-h:     0 6px 30px rgba(160,112,16,0.18), 0 0 0 1px rgba(160,112,16,0.18);
  --osho-border:  rgba(160,112,16,0.14);
  --osho-bg:      rgba(160,112,16,0.04);
}
/* ════════ RESET ════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--dev);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
[data-theme="dark"] body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.35}
::selection{background:rgba(212,175,55,0.2);color:var(--gold-light)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.22);border-radius:4px}

/* ════════ SPLASH ════════ */
#splash{position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;transition:opacity .8s,visibility .8s}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.s-om{font-size:76px;line-height:1;margin-bottom:16px;color:#d4af37;filter:drop-shadow(0 0 28px rgba(212,175,55,.45));animation:omP 2s ease-in-out infinite}
.s-title{font-family:var(--dis);font-size:clamp(26px,6vw,40px);color:#d4af37;letter-spacing:.14em;margin-bottom:5px}
.s-sub{font-family:var(--dev);font-size:13px;color:rgba(240,234,216,.45);letter-spacing:.06em}
.s-bar{width:110px;height:2px;background:rgba(212,175,55,.18);border-radius:2px;margin-top:28px;overflow:hidden}
.s-bar::after{content:'';display:block;height:100%;background:#d4af37;border-radius:2px;animation:ld 2s ease forwards}
.s-status{font-family:var(--en);font-style:italic;font-size:11px;color:rgba(212,175,55,.4);margin-top:10px;letter-spacing:.06em;min-height:16px}
@keyframes ld{from{width:0}to{width:100%}}
@keyframes omP{0%,100%{transform:scale(1);filter:drop-shadow(0 0 24px rgba(212,175,55,.4))}50%{transform:scale(1.07);filter:drop-shadow(0 0 44px rgba(212,175,55,.75))}}

/* ════════ HEADER ════════ */
header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border);padding:0 20px;transition:background .4s,border-color .4s}
.h-inner{max-width:740px;margin:0 auto;padding:13px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.b-om{font-size:24px;line-height:1;color:var(--gold);filter:drop-shadow(0 0 7px rgba(212,175,55,.45))}
.b-text{display:flex;flex-direction:column;line-height:1.15}
.b-name{font-family:var(--dis);font-size:19px;color:var(--gold-light);letter-spacing:.09em}
.b-tag{font-family:var(--en);font-style:italic;font-size:10.5px;color:var(--text-3);letter-spacing:.05em}
.h-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-tog{display:flex;background:rgba(128,128,128,.07);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.lang-btn{background:transparent;border:none;padding:5px 12px;border-radius:100px;font-family:var(--dev);font-size:12px;color:var(--text-2);cursor:pointer;transition:var(--t);white-space:nowrap;outline:none}
.lang-btn.active{background:var(--gold);color:#0a0a0a;font-weight:600;box-shadow:0 2px 10px rgba(212,175,55,.28)}
.theme-btn{width:36px;height:36px;background:rgba(128,128,128,.07);border:1px solid var(--border);border-radius:50%;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--t);flex-shrink:0}
.theme-btn:hover{border-color:var(--border-hover);background:rgba(212,175,55,.08);transform:rotate(18deg) scale(1.08)}

/* ════════ STATS ════════ */
.stats{max-width:740px;margin:0 auto;padding:10px 20px}
.stats span{font-family:var(--en);font-size:12px;color:var(--text-3);letter-spacing:.04em}
.stats b{color:var(--gold-dim)}

/* ════════ MAIN ════════ */
main{max-width:740px;margin:0 auto;padding:4px 16px 80px}

/* chapter divider */
.ch-div{text-align:center;padding:22px 0 10px}
.ch-label{font-family:var(--dis);font-size:12px;color:var(--gold-dim);letter-spacing:.2em;text-transform:uppercase;display:inline-flex;align-items:center;gap:12px}
.ch-label::before,.ch-label::after{content:'';display:block;width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.ch-label::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.ch-sub{font-family:var(--en);font-style:italic;font-size:11px;color:var(--text-3);margin-top:4px;text-align:center}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px 22px 18px;margin-bottom:11px;box-shadow:var(--shadow);transition:var(--t);position:relative;overflow:hidden;opacity:0;transform:translateY(18px)}
.card.vis{opacity:1;transform:translateY(0)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:0;transition:opacity .3s}
.card:hover{background:var(--card-hover);border-color:var(--border-hover);box-shadow:var(--shadow-h);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card.faved{border-color:rgba(212,175,55,.38)}
[data-theme="light"] .card.faved{border-color:rgba(160,112,16,.34)}

/* card header */
.c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.s-num{font-family:var(--en);font-size:11px;color:var(--gold-dim);letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:3px 10px;border:1px solid var(--border);border-radius:100px;flex-shrink:0;margin-top:2px}
.fav-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-3);transition:var(--t);padding:3px;line-height:1;flex-shrink:0;outline:none}
.fav-btn:hover{color:var(--gold);transform:scale(1.25)}
.fav-btn.on{color:var(--gold);filter:drop-shadow(0 0 5px rgba(212,175,55,.5))}

/* sanskrit */
.skt{font-family:var(--dev);font-size:clamp(17px,4.2vw,21px);font-weight:500;line-height:1.65;color:var(--text);margin-bottom:12px;letter-spacing:.01em}

/* translation */
.trans{font-size:clamp(13px,3vw,15px);line-height:1.75;color:var(--text-2);padding-top:11px;border-top:1px solid var(--border);transition:opacity .28s}
.trans.hi{font-family:var(--dev);font-weight:300}
.trans.en{font-family:var(--en);font-style:italic;font-size:clamp(14px,3.3vw,16px);letter-spacing:.01em}
.trans.fade{opacity:0}

/* osho block */
.osho-block{margin-top:12px;padding:12px 14px;background:var(--osho-bg);border:1px solid var(--osho-border);border-left:2px solid var(--gold-dim);border-radius:10px;opacity:0;max-height:0;overflow:hidden;transition:opacity .35s,max-height .4s ease,padding .3s}
.osho-block.open{opacity:1;max-height:400px}
.osho-label{font-family:var(--en);font-size:10px;color:var(--gold-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:7px}
.osho-text{font-size:clamp(12px,2.8vw,14px);line-height:1.8;color:var(--text-2)}
.osho-text.hi{font-family:var(--dev);font-weight:300}
.osho-text.en{font-family:var(--en);font-style:italic}
.osho-btn{background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:4px 10px;border-radius:100px;font-family:var(--en);font-size:11px;color:var(--gold-dim);letter-spacing:.08em;border:1px solid var(--osho-border);transition:var(--t);outline:none}
.osho-btn:hover{background:var(--osho-bg);border-color:var(--gold-dim);color:var(--gold)}
.osho-btn .arr{transition:transform .3s}
.osho-btn.open .arr{transform:rotate(180deg)}

/* install banner */
#instBanner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);z-index:500;background:var(--card);border:1px solid var(--border-hover);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:calc(100vw - 32px);width:360px;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0}
#instBanner.show{transform:translateX(-50%) translateY(0);opacity:1}
#instBanner.hide{transform:translateX(-50%) translateY(120px);opacity:0}
.ib-icon{font-size:26px;flex-shrink:0}
.ib-text{flex:1;min-width:0}
.ib-title{font-family:var(--dis);font-size:14px;color:var(--gold-light);letter-spacing:.06em;margin-bottom:2px}
.ib-sub{font-family:var(--en);font-style:italic;font-size:11.5px;color:var(--text-3)}
.ib-acts{display:flex;gap:6px;flex-shrink:0}
.ib-btn{padding:7px 14px;border-radius:100px;border:none;font-family:var(--dev);font-size:12px;cursor:pointer;outline:none;transition:var(--t);font-weight:600}
.ib-btn.p{background:var(--gold);color:#0a0a0a;box-shadow:0 2px 12px rgba(212,175,55,.3)}
.ib-btn.p:hover{background:var(--gold-light);transform:scale(1.05)}
.ib-btn.d{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text-3)}

/* toast */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:400;padding:9px 18px;border-radius:100px;font-family:var(--dev);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.off{background:#2a1a0a;border:1px solid rgba(212,100,30,.4);color:#f0a060}
#toast.on{background:#0a1a0a;border:1px solid rgba(80,180,80,.35);color:#80d080}

/* cache badge */
.cache-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--en);font-size:11px;color:var(--text-3);margin-top:6px;opacity:0;transition:opacity .5s}
.cache-badge.show{opacity:1}
.c-dot{width:6px;height:6px;border-radius:50%;background:#80d080;box-shadow:0 0 6px rgba(80,200,80,.5)}

/* footer */
footer{text-align:center;padding:18px 20px;border-top:1px solid var(--border);margin-top:16px}
.ft{font-family:var(--en);font-style:italic;font-size:11.5px;color:var(--text-3)}
.ft-om{color:var(--gold-dim);font-style:normal}

/* responsive */
@media(max-width:480px){
  .card{padding:18px 16px 14px}
  .b-tag{display:none}
  .lang-btn{padding:5px 10px}
  #instBanner{width:calc(100vw - 32px)}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="s-om">ॐ</div>
  <div class="s-title">Shiv Sutra</div>
  <div class="s-sub">शिव सूत्र · Know Yourself as Consciousness</div>
  <div class="s-bar"></div>
  <div class="s-status" id="splashSt">Loading sutras…</div>
</div>

<!-- INSTALL BANNER -->
<div id="instBanner">
  <div class="ib-icon">🕉️</div>
  <div class="ib-text">
    <div class="ib-title">Install Shiv Sutra</div>
    <div class="ib-sub">Offline पढ़ें · Works without internet</div>
  </div>
  <div class="ib-acts">
    <button class="ib-btn p" onclick="doInstall()">Install</button>
    <button class="ib-btn d" onclick="dismissInstall()">✕</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- HEADER -->
<header>
  <div class="h-inner">
    <a class="brand" href="#">
      <span class="b-om">ॐ</span>
      <span class="b-text">
        <span class="b-name">Shiv Sutra</span>
        <span class="b-tag">Know Yourself as Consciousness</span>
      </span>
    </a>
    <div class="h-controls">
      <div class="lang-tog">
        <button class="lang-btn active" data-lang="hindi"   onclick="setLang('hindi')">हिंदी</button>
        <button class="lang-btn"        data-lang="english" onclick="setLang('english')">English</button>
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </div>
</header>

<!-- STATS -->
<div class="stats"><span><b id="sCount">77</b> सूत्र · Sutras</span></div>

<!-- MAIN -->
<main id="main"></main>

<footer>
  <div class="ft"><span class="ft-om">ॐ</span> नमः शिवाय · Shiv Sutra PWA</div>
  <div class="cache-badge" id="cacheBadge"><span class="c-dot"></span>Saved offline · Offline उपलब्ध</div>
</footer>

<script>
/* ══════ STATE ══════ */
let SUTRAS = [], CHAPTERS = [];
let lang  = localStorage.getItem('ss-lang')  || 'hindi';
let theme = localStorage.getItem('ss-theme') || 'dark';
let favs  = JSON.parse(localStorage.getItem('ss-favs') || '[]');

/* ══════ THEME (apply immediately) ══════ */
applyTheme(theme, false);
document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

function applyTheme(t, anim=true) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  const meta = document.getElementById('themeColorMeta');
  if (btn)  btn.textContent = t === 'dark' ? '🌙' : '☀️';
  if (meta) meta.content    = t === 'dark' ? '#0a0a0a' : '#fdf8ee';
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ss-theme', theme);
  applyTheme(theme);
}

/* ══════ LOAD DATA ══════ */
window.addEventListener('load', async () => {
  const st = document.getElementById('splashSt');
  try {
    st.textContent = 'Loading sutras.json…';
    const res  = await fetch('./sutras.json');
    const data = await res.json();
    SUTRAS   = data.sutras;
    CHAPTERS = data.chapters;
    st.textContent = `✓ ${SUTRAS.length} sutras loaded`;
  } catch(e) {
    st.textContent = 'Error loading data';
    console.error(e);
  }
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
    renderCards();
    setupObserver();
  }, 2000);
});

/* ══════ RENDER ══════ */
function renderCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let lastCh = 0;

  SUTRAS.forEach((s, idx) => {
    const ch = CHAPTERS.find(c => s.id >= c.range[0] && s.id <= c.range[1]);
    if (ch && ch.id !== lastCh) {
      const div = document.createElement('div');
      div.className = 'ch-div';
      div.innerHTML = `<div><span class="ch-label">अध्याय ${ch.id} · ${ch.nameEn}</span></div>
                       <div class="ch-sub">${ch.subtitle}</div>`;
      main.appendChild(div);
      lastCh = ch.id;
    }

    const isFav = favs.includes(s.id);
    const card  = document.createElement('div');
    card.className = 'card' + (isFav ? ' faved' : '');
    card.dataset.id = s.id;
    card.style.transitionDelay = `${Math.min(idx * 0.022, 0.5)}s`;

    const oshoText  = lang === 'hindi' ? s.osho_hindi  : s.osho_english;
    const transText = lang === 'hindi' ? s.hindi       : s.english;
    const transClass = lang === 'hindi' ? 'hi' : 'en';
    const oshoClass  = lang === 'hindi' ? 'hi' : 'en';

    card.innerHTML = `
      <div class="c-head">
        <span class="s-num">सूत्र ${String(s.id).padStart(2,'0')}</span>
        <button class="fav-btn ${isFav?'on':''}" onclick="toggleFav(${s.id},this)" title="Favorite">${isFav?'★':'☆'}</button>
      </div>
      <div class="skt">${s.sanskrit}</div>
      <div class="trans ${transClass}" data-id="${s.id}">${transText}</div>
      <button class="osho-btn" onclick="toggleOsho(this)" title="Osho commentary">
        <span>ओशो · Osho</span><span class="arr">▾</span>
      </button>
      <div class="osho-block">
        <div class="osho-label">ओशो — Osho Commentary</div>
        <div class="osho-text ${oshoClass}" data-id="${s.id}">${oshoText}</div>
      </div>`;

    main.appendChild(card);
  });
  setupObserver();
}

/* ══════ OSHO TOGGLE ══════ */
function toggleOsho(btn) {
  const block = btn.nextElementSibling;
  const isOpen = block.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

/* ══════ LANGUAGE ══════ */
function setLang(l) {
  if (l === lang) return;
  lang = l;
  localStorage.setItem('ss-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));

  const trans = document.querySelectorAll('.trans');
  const oshos = document.querySelectorAll('.osho-text');
  trans.forEach(el => el.classList.add('fade'));
  setTimeout(() => {
    trans.forEach(el => {
      const s = SUTRAS.find(x => x.id === +el.dataset.id);
      if (!s) return;
      el.textContent = l === 'hindi' ? s.hindi : s.english;
      el.className = `trans ${l==='hindi'?'hi':'en'}`;
    });
    oshos.forEach(el => {
      const s = SUTRAS.find(x => x.id === +el.dataset.id);
      if (!s) return;
      el.textContent = l === 'hindi' ? s.osho_hindi : s.osho_english;
      el.className = `osho-text ${l==='hindi'?'hi':'en'}`;
    });
    requestAnimationFrame(() => trans.forEach(el => el.classList.remove('fade')));
  }, 270);
}

/* ══════ FAVORITES ══════ */
function toggleFav(id, btn) {
  const i = favs.indexOf(id);
  if (i === -1) { favs.push(id); btn.textContent='★'; btn.classList.add('on'); btn.closest('.card').classList.add('faved'); }
  else { favs.splice(i,1); btn.textContent='☆'; btn.classList.remove('on'); btn.closest('.card').classList.remove('faved'); }
  localStorage.setItem('ss-favs', JSON.stringify(favs));
}

/* ══════ SCROLL OBSERVER ══════ */
function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); } });
  }, { threshold: 0.04, rootMargin: '0px 0px -16px 0px' });
  document.querySelectorAll('.card:not(.vis)').forEach(c => obs.observe(c));
}

/* ══════ INSTALL / OFFLINE ══════ */
let dip = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); dip = e;
  setTimeout(showBanner, 4000);
});
window.addEventListener('appinstalled', () => {
  hideBanner();
  showToast('✓ Installed! Offline ready', 'on', 3500);
  document.getElementById('cacheBadge').classList.add('show');
});

function showBanner() {
  if (sessionStorage.getItem('ss-ib')) return;
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  document.getElementById('instBanner').classList.add('show');
}
function hideBanner() {
  const b = document.getElementById('instBanner');
  b.classList.remove('show'); b.classList.add('hide');
}
function doInstall() {
  if (!dip) return; hideBanner();
  dip.prompt();
  dip.userChoice.then(r => { dip = null; if (r.outcome==='accepted') showToast('Installing…','on',2500); });
}
function dismissInstall() { hideBanner(); sessionStorage.setItem('ss-ib','1'); }

function showToast(msg, type, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  clearTimeout(t._t); t._t = setTimeout(() => { t.className = type; }, dur);
}
window.addEventListener('offline', () => showToast('📵 Offline — Cache से चल रहा है','off',5000));
window.addEventListener('online',  () => showToast('✓ Online — Connected','on',3000));

/* ══════ SERVICE WORKER ══════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      if (reg.active) setTimeout(() => document.getElementById('cacheBadge').classList.add('show'), 1500);
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller)
            showToast('↻ App updated — Refresh करें','on',6000);
          if (w.state === 'activated') {
            document.getElementById('cacheBadge').classList.add('show');
            document.getElementById('splashSt').textContent = '✓ Offline saved';
          }
        });
      });
    }).catch(e => console.warn('SW:',e));

    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'CACHE_PROGRESS') {
        const el = document.getElementById('splashSt');
        if (el) el.textContent = e.data.msg;
      }
      if (e.data?.type === 'CACHED') {
        document.getElementById('cacheBadge').classList.add('show');
      }
    });
  });
}
</script>
